<!--
  homelab-sentinel — ossec.conf snippet
  ======================================
  Paste this inside your <ossec_config> block in /var/ossec/etc/ossec.conf
  Then restart the Wazuh manager:  sudo systemctl restart wazuh-manager
-->

<!-- ── Integration: forward Level 7+ alerts to Telegram ──────────────── -->
<integration>
  <name>custom-telegram</name>
  <alert_format>json</alert_format>
  <level>7</level>
</integration>

<!-- ── Active Response: ban IPs via notify-ban.py ────────────────────── -->
<command>
  <name>notify-ban</name>
  <executable>notify-ban.py</executable>
  <timeout_allowed>yes</timeout_allowed>
</command>

<!-- Example: trigger on brute-force SSH (rule 5763) with 10-minute ban -->
<active-response>
  <command>notify-ban</command>
  <location>local</location>
  <rule_id>5763</rule_id>
  <timeout>600</timeout>
</active-response>

<!-- Example: trigger on web attack rules (group web_attack) -->
<active-response>
  <command>notify-ban</command>
  <location>local</location>
  <rules_group>web_attack</rules_group>
  <timeout>600</timeout>
</active-response>

<!-- Add more <active-response> blocks for other rules you want to ban on.
     Common triggers:
       rule_id 31151  - multiple auth failures
       rule_id 5710   - SSH failed login
       rule_id 5711   - SSH failed login (invalid user)
       rule_id 5763   - SSH brute-force (multiple failures)
       rules_group "authentication_failed" - any auth failure
-->
