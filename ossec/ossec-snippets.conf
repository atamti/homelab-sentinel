<!--
  ossec-snippets.conf — XML blocks to add to /var/ossec/etc/ossec.conf
  =====================================================================
  Copy the relevant sections into your ossec.conf.  These are NOT a
  standalone file — they must be merged into the existing <ossec_config>.

  After editing, validate and restart:
    sudo /var/ossec/bin/wazuh-control status
    sudo systemctl restart wazuh-manager
-->


<!-- ═══════════════════════════════════════════════════════════════════════
     1. COMMAND — defines firewall-notify-drop (calls notify-ban.py)
     ═══════════════════════════════════════════════════════════════════════ -->

<!--
  Add this INSIDE <ossec_config>, near your other <command> blocks.
  notify-ban.py wraps the built-in firewall-drop: it calls firewall-drop
  internally, then sends the Telegram notification and writes the ban log.
-->

<command>
  <name>firewall-notify-drop</name>
  <executable>notify-ban.py</executable>
  <timeout_allowed>yes</timeout_allowed>
</command>


<!-- ═══════════════════════════════════════════════════════════════════════
     2. ACTIVE RESPONSES — replace firewall-drop with firewall-notify-drop
     ═══════════════════════════════════════════════════════════════════════ -->

<!--
  Update your existing <active-response> blocks: change
    <command>firewall-drop</command>
  to
    <command>firewall-notify-drop</command>

  Example rules (adjust rule IDs and timeouts to match your setup):
-->

<!-- SSH brute force -->
<active-response>
  <command>firewall-notify-drop</command>
  <location>local</location>
  <rules_id>5763</rules_id>
  <timeout>1800</timeout>
</active-response>

<!-- Repeated authentication failures -->
<active-response>
  <command>firewall-notify-drop</command>
  <location>local</location>
  <rules_id>5710,5711</rules_id>
  <timeout>600</timeout>
</active-response>

<!-- Web attack / SQL injection / common exploit -->
<active-response>
  <command>firewall-notify-drop</command>
  <location>local</location>
  <rules_id>31151,31153,31164</rules_id>
  <timeout>3600</timeout>
</active-response>


<!-- ═══════════════════════════════════════════════════════════════════════
     3. INTEGRATION — Telegram alert notifications via custom-telegram
     ═══════════════════════════════════════════════════════════════════════ -->

<!--
  Forwards all Level 7+ alerts to Telegram.  custom-telegram handles
  routing: everything goes to the full-log channel, Level 10+ also
  goes to the critical channel (excluding SILENT_RULES).

  The integration script reads BOT_TOKEN / chat IDs from env vars
  injected via /etc/homelab-sentinel.env.  For Wazuh to pass the env
  to the integration, add to your systemd override or use the Wazuh
  environment mechanism:

    /var/ossec/etc/local_internal_options.conf
    integratord.env_file=/etc/homelab-sentinel.env
-->

<integration>
  <name>custom-telegram</name>
  <alert_format>json</alert_format>
  <level>7</level>
</integration>
